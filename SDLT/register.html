<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>إنشاء حساب جديد - SDLT</title>
</head>
<body class="bg-[#121212] min-h-screen flex items-center justify-center p-4">
    <div class="bg-[#181818] border border-slate-800 p-8 rounded-2xl w-full max-w-sm shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white mb-2">إنشاء حساب جديد</h2>
            <p class="text-slate-500 text-sm">سجل بياناتك للبدء في نظام SDLT</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="fullName" placeholder="الاسم الكامل" class="w-full bg-[#1e1e1e] border border-slate-700 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-emerald-500">
            <input type="tel" id="phone" placeholder="رقم الجوال" class="w-full bg-[#1e1e1e] border border-slate-700 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-emerald-500">
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full bg-[#1e1e1e] border border-slate-700 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-emerald-500">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full bg-[#1e1e1e] border border-slate-700 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-emerald-500">
            <button onclick="signUp()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-[#121212] font-bold py-3 rounded-lg transition-all">إنشاء الحساب</button>
        </div>
        <p class="text-center text-slate-500 text-xs mt-6">لديك حساب بالفعل؟ <a href="login.html" class="text-emerald-500 hover:underline font-bold">تسجيل الدخول</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        async function signUp() {
    const btn = event.target; // زر الإنشاء
    btn.disabled = true;      // تعطيل الزر لمنع التكرار
    btn.innerText = "جاري الإنشاء...";
    
    // ... كود الـ signUp الخاص بك ...
    
    // في حال حدث خطأ أو انتهت العملية أعد تفعيل الزر
    btn.disabled = false;
    btn.innerText = "إنشاء الحساب";
}
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;

            const { error } = await db.auth.signUp({
                email, password,
                options: { data: { full_name: fullName, phone: phone } }
            });
            if (error) alert("خطأ: " + error.message);
            else alert("تم إرسال طلبك! بانتظار تفعيل الأدمن لصلاحياتك.");
        }
    </script>
</body>
</html>
